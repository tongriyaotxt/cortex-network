# 阶段 2：符号推理 + 自我建模
# 在阶段 1 checkpoint 基础上，开启 M1/M2

# 从阶段 1 恢复
resume: outputs/stage1_lm/best.pt

task: lm
data_path: data/reasoning/synthetic_train.jsonl
seq_len: 256
batch_size: 8

# 模型配置（继承阶段 1）
vocab_size: 32000
d_model: 512
n_layers: 8
n_modules: 8
workspace_dim: 256
n_branches: 4
n_timescales: 3
max_seq_len: 2048
dropout: 0.1

# AGI 模块：开启 M1 + M2
use_symbolic: true
use_self_modeling: true
use_embodied: false
use_hierarchical: false
use_continual: false
use_causal: false

# M1/M2 配置
symbolic_vocab_size: 1024
memory_capacity: 10000

# 损失权重
lambda_symbolic: 0.05
lambda_self: 0.05
lambda_action: 0.0
lambda_plasticity: 0.0

# 训练配置（较低学习率微调）
lr: 0.0001
weight_decay: 0.01
total_steps: 50000
warmup_steps: 2000
max_grad_norm: 1.0
use_scheduler: true
use_amp: true
curriculum: false

# 日志
output_dir: outputs/stage2_reasoning
log_interval: 100
val_interval: 5000
save_interval: 20000
