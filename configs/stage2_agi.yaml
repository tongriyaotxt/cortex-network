# Stage 2: 符号推理 + 自我建模 (M1 + M2)
# 从 Stage 1 中文基线恢复，开启 AGI 模块

resume: outputs/stage1_chinese/best.pt

task: lm
data_path: data_v3/stage2_combined/train.txt
val_data_path: data_v3/stage2_combined/val.txt
seq_len: 256
batch_size: 8

# Tokenizer
tokenizer_path: data/tokenizer/bpe_4096.json
tokenizer_type: bpe

# 模型配置（继承 Stage 1）
vocab_size: 4096
d_model: 510
n_layers: 8
n_modules: 8
workspace_dim: 256
n_branches: 4
n_timescales: 3
max_seq_len: 2048
dropout: 0.1

# AGI 模块：开启 M1 + M2
use_symbolic: true
use_self_modeling: true
use_embodied: false
use_hierarchical: false
use_continual: false
use_causal: false

# M1/M2 配置
symbolic_vocab_size: 512
memory_capacity: 10000

# 训练配置（较低学习率微调）
lr: 0.0001
weight_decay: 0.01
total_steps: 3000
warmup_steps: 500
max_grad_norm: 1.0
use_scheduler: true
use_amp: true
curriculum: false

# 日志
output_dir: outputs/stage2_agi
log_interval: 1
val_interval: 500
save_interval: 1000
