# Stage 1: 中文基础语言模型预训练
# 目标：在真实中文语料上训练核心 CORTEX，建立可靠的语言基线
# 硬件：RTX 5070 Ti (16GB GDDR6)

task: lm
data_path: data_v3/stage1_chinese_corpus/processed/corpus_train.txt
val_data_path: data_v3/stage1_chinese_corpus/processed/corpus_val.txt
seq_len: 512
batch_size: 8

# Tokenizer
tokenizer_path: data/tokenizer/bpe_4096.json
tokenizer_type: bpe

# 模型配置（150M 参数级别，适合 16GB 显存）
vocab_size: 4096
d_model: 510              # 510/3=170，可被 n_timescales 整除
n_layers: 8
n_modules: 8
workspace_dim: 256
n_branches: 4
n_timescales: 3
max_seq_len: 2048         # 训练时 512，但模型支持更长
dropout: 0.1

# AGI 模块：Stage 1 全部关闭，专注语言能力
use_symbolic: false
use_self_modeling: false
use_embodied: false
use_hierarchical: false
use_continual: false
use_causal: false

# 训练配置
lr: 0.0003
weight_decay: 0.01
total_steps: 3000         # 约 13 epoch（2.78MB 语料）
warmup_steps: 2000
max_grad_norm: 1.0
use_scheduler: true
use_amp: true             # 混合精度，必须开，省显存
curriculum: false

# 日志
output_dir: outputs/stage1_chinese
log_interval: 1
val_interval: 500
save_interval: 500
