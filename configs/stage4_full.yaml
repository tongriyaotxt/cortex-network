# 阶段 4：全模块联合训练
# 开启 M5（持续学习）+ M6（因果推断），全模块协同

# 从阶段 3 恢复
resume: outputs/stage3_rl/best.pt

task: lm
data_path: data/wikitext/train.txt  # 回归语言数据防止遗忘
seq_len: 512
batch_size: 4

# 模型配置
vocab_size: 32000
d_model: 512
n_layers: 12
n_modules: 8
workspace_dim: 256
n_branches: 4
n_timescales: 3
max_seq_len: 2048
dropout: 0.1

# AGI 模块：全部开启
use_symbolic: true
use_self_modeling: true
use_embodied: true
use_hierarchical: true
use_continual: true
use_causal: true

# 配置
symbolic_vocab_size: 1024
n_subroutines: 8
memory_capacity: 20000
max_goal_depth: 5
n_counterfactuals: 2

# 损失权重（均衡）
lambda_symbolic: 0.02
lambda_self: 0.02
lambda_action: 0.05
lambda_plasticity: 0.001

# 训练配置（极低学习率微调）
lr: 0.00005
weight_decay: 0.01
total_steps: 100000
warmup_steps: 3000
max_grad_norm: 1.0
use_scheduler: true
use_amp: true
curriculum: true  # 课程学习渐进启用

# 日志
output_dir: outputs/stage4_full
log_interval: 100
val_interval: 5000
save_interval: 20000
